<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifestyle Assessment — Roommate Sync</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#080c18;--bg2:#0d1426;--glass:rgba(255,255,255,0.045);--glass-b:rgba(255,255,255,0.10);--glass-h:rgba(255,255,255,0.075);--v:#7c5cfc;--sky:#38bdf8;--rose:#f472b6;--green:#4ade80;--amber:#fbbf24;--t1:#f0f4ff;--t2:#8892aa;--t3:#4a5568;--r:20px;--rL:28px;--tr:0.3s cubic-bezier(0.4,0,0.2,1)}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;overflow-x:hidden}
.bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.3;animation:drift 18s ease-in-out infinite alternate}
.o1{width:500px;height:500px;background:radial-gradient(circle,#7c5cfc,transparent 70%);top:-100px;right:-80px}
.o2{width:400px;height:400px;background:radial-gradient(circle,#2dd4bf,transparent 70%);bottom:5%;left:-60px;animation-delay:-10s}
@keyframes drift{0%{transform:translate(0,0)}100%{transform:translate(25px,-30px)}}
.grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}

/* LAYOUT */
.page-wrapper{position:relative;z-index:2;display:grid;grid-template-columns:280px 1fr;min-height:100vh}

/* SIDEBAR */
.sidebar{background:rgba(8,12,24,.8);backdrop-filter:blur(20px);border-right:1px solid var(--glass-b);padding:32px 24px;display:flex;flex-direction:column;gap:32px;position:sticky;top:0;height:100vh}
.sidebar-brand{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--t1);font-family:'Outfit',sans-serif;font-weight:700;font-size:1.1rem}
.brand-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--v),var(--sky));border-radius:9px;display:grid;place-items:center;font-size:.95rem}
.progress-section{}
.prog-label{display:flex;justify-content:space-between;margin-bottom:10px;font-size:.8rem;color:var(--t2)}
.prog-track{height:5px;background:rgba(255,255,255,.08);border-radius:9999px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--v),var(--sky));border-radius:9999px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.steps-list{display:flex;flex-direction:column;gap:8px}
.step-item{display:flex;align-items:center;gap:12px;padding:12px;border-radius:12px;transition:var(--tr)}
.step-item.active{background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2)}
.step-item.done{background:rgba(74,222,128,.06);border:1px solid rgba(74,222,128,.15)}
.step-circle{width:28px;height:28px;border-radius:50%;background:var(--glass-b);display:grid;place-items:center;font-size:.75rem;font-weight:700;flex-shrink:0;transition:var(--tr)}
.step-item.active .step-circle{background:rgba(124,92,252,.2);color:#a78bfa;border:1px solid rgba(124,92,252,.3)}
.step-item.done .step-circle{background:rgba(74,222,128,.15);color:var(--green);border:1px solid rgba(74,222,128,.3)}
.step-name{font-size:.875rem;color:var(--t2)}
.step-item.active .step-name{color:var(--t1);font-weight:600}
.step-item.done .step-name{color:var(--green)}
.user-info{margin-top:auto;display:flex;align-items:center;gap:10px;padding:12px;background:var(--glass);border:1px solid var(--glass-b);border-radius:12px}
.user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--v),var(--rose));display:grid;place-items:center;font-family:'Outfit',sans-serif;font-weight:700;font-size:.9rem;flex-shrink:0}
.user-name{font-size:.85rem;font-weight:600;color:var(--t1)}
.user-email{font-size:.72rem;color:var(--t3)}
.btn-logout{margin-left:auto;padding:5px 10px;background:none;border:1px solid var(--glass-b);border-radius:8px;color:var(--t3);font-size:.75rem;cursor:pointer;transition:var(--tr)}
.btn-logout:hover{color:var(--t1);border-color:rgba(255,255,255,.2)}

/* QUIZ MAIN */
.quiz-main{display:flex;align-items:center;justify-content:center;padding:60px 40px;min-height:100vh}
.question-card{max-width:700px;width:100%;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.q-badge{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;background:rgba(124,92,252,.1);border:1px solid rgba(124,92,252,.2);border-radius:9999px;font-size:.75rem;font-weight:600;color:#a78bfa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:20px}
.q-title{font-family:'Outfit',sans-serif;font-size:clamp(1.6rem,4vw,2.2rem);font-weight:800;letter-spacing:-.03em;line-height:1.2;margin-bottom:10px}
.q-sub{color:var(--t2);font-size:.95rem;line-height:1.6;margin-bottom:36px}
.options-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:36px}
.option-label{cursor:pointer}
.option-label input{position:absolute;opacity:0;pointer-events:none}
.option-card{padding:22px 20px;background:var(--glass);border:1.5px solid var(--glass-b);border-radius:18px;transition:all .25s cubic-bezier(.4,0,.2,1);position:relative;overflow:hidden}
.option-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04) 0%,transparent 60%);pointer-events:none}
.option-label:hover .option-card{background:var(--glass-h);border-color:rgba(124,92,252,.3);transform:translateY(-2px)}
.option-label input:checked + .option-card{background:rgba(124,92,252,.12);border-color:var(--v);box-shadow:0 0 0 3px rgba(124,92,252,.12)}
.option-label input:checked + .option-card .check-dot{background:var(--v);border-color:var(--v)}
.option-label input:checked + .option-card .check-dot::after{display:block}
.check-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--glass-b);background:rgba(255,255,255,.06);position:absolute;top:16px;right:16px;transition:var(--tr)}
.check-dot::after{content:'';display:none;width:8px;height:8px;border-radius:50%;background:#fff;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
.opt-icon{font-size:2rem;margin-bottom:12px;display:block}
.opt-heading{font-family:'Outfit',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:5px}
.opt-desc{font-size:.82rem;color:var(--t2);line-height:1.5}
.quiz-footer{display:flex;justify-content:space-between;align-items:center}
.btn-ghost{padding:12px 24px;background:var(--glass);border:1px solid var(--glass-b);border-radius:12px;color:var(--t2);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--tr)}
.btn-ghost:hover{background:var(--glass-h);color:var(--t1)}
.btn-ghost:disabled{opacity:.35;cursor:not-allowed}
.btn-next{padding:12px 28px;background:linear-gradient(135deg,var(--v),var(--sky));border:none;border-radius:12px;color:#fff;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:var(--tr);display:flex;align-items:center;gap:8px}
.btn-next:hover{opacity:.88;transform:translateY(-1px);box-shadow:0 8px 24px rgba(124,92,252,.35)}
.btn-next:disabled{opacity:.4;cursor:not-allowed;transform:none}
.err-banner{display:none;margin-top:12px;padding:12px 16px;background:rgba(248,113,113,.08);border:1px solid rgba(248,113,113,.2);border-radius:10px;color:#f87171;font-size:.85rem}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(100px);background:rgba(15,20,40,.95);border:1px solid var(--glass-b);border-radius:12px;padding:14px 24px;font-size:.875rem;color:var(--t1);z-index:9999;transition:.4s;backdrop-filter:blur(20px)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:rgba(248,113,113,.3);color:#f87171}
@media(max-width:768px){.page-wrapper{grid-template-columns:1fr}.sidebar{display:none}.quiz-main{padding:40px 20px}}
</style>
</head>
<body>
<div class="bg-canvas"><div class="orb o1"></div><div class="orb o2"></div></div>
<div class="grain"></div>

<div class="page-wrapper">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <a href="index.html" class="sidebar-brand"><div class="brand-icon">🏠</div>RoommateSync</a>
    <div class="progress-section">
      <div class="prog-label"><span>Step <span id="stepNum">1</span> of 4</span><span id="stepPct">25%</span></div>
      <div class="prog-track"><div class="prog-fill" id="progFill" style="width:25%"></div></div>
    </div>
    <div class="steps-list" id="stepsList">
      <div class="step-item active" data-step="1"><div class="step-circle">1</div><span class="step-name">Sleep Habits</span></div>
      <div class="step-item" data-step="2"><div class="step-circle">2</div><span class="step-name">Food Preferences</span></div>
      <div class="step-item" data-step="3"><div class="step-circle">3</div><span class="step-name">Cleanliness</span></div>
      <div class="step-item" data-step="4"><div class="step-circle">4</div><span class="step-name">Budgeting</span></div>
    </div>
    <div class="user-info">
      <div class="user-avatar" id="sidebarAvatar">?</div>
      <div><div class="user-name" id="sidebarName">Loading...</div><div class="user-email" id="sidebarEmail"></div></div>
      <button class="btn-logout" onclick="doLogout()">Out</button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="quiz-main">
    <div class="question-card" id="questionCard">
      <!-- Rendered by JS -->
    </div>
  </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ⚠️ REPLACE WITH YOUR FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let currentStep = 1;
const answers = { sleep: null, food: null, clean: null, budget: null };

const QUESTIONS = [
  {
    step: 1, key: 'sleep', badge: 'Biological Rhythms', title: 'What is your typical sleep schedule?',
    sub: 'We match you with people who are awake when you are to minimize conflicts.',
    options: [
      { value: 'early', icon: '☀️', heading: 'Early Bird', desc: 'I wake up before 7 AM and sleep before 11 PM.' },
      { value: 'regular', icon: '⏰', heading: 'Standard', desc: 'Typical 9-5 schedule, sleep around midnight.' },
      { value: 'late', icon: '🌙', heading: 'Night Owl', desc: 'I am most active at night and sleep late.' }
    ]
  },
  {
    step: 2, key: 'food', badge: 'Kitchen Dynamics', title: 'What are your dietary preferences?',
    sub: 'This helps match you with compatible kitchen habits and meal preferences.',
    options: [
      { value: 'veg', icon: '🥗', heading: 'Vegetarian/Vegan', desc: 'I prefer plant-based foods.' },
      { value: 'omni', icon: '🍗', heading: 'Non-Vegetarian', desc: 'I eat all kinds of food including meat.' },
      { value: 'vegan', icon: '🌱', heading: 'Strict Vegan', desc: 'No animal products at all.' }
    ]
  },
  {
    step: 3, key: 'clean', badge: 'Living Standards', title: 'How would you describe your cleanliness?',
    sub: 'Mismatched cleanliness is the #1 cause of roommate conflicts.',
    options: [
      { value: 'neat', icon: '✨', heading: 'Very Neat', desc: 'I clean regularly and keep everything spotless.' },
      { value: 'average', icon: '🧹', heading: 'Regularly Tidy', desc: 'I clean when needed, not obsessively.' },
      { value: 'messy', icon: '🎨', heading: 'Relaxed', desc: 'Organized chaos — I clean when I feel like it.' }
    ]
  },
  {
    step: 4, key: 'budget', badge: 'Financial Compatibility', title: 'What is your monthly budget for rent?',
    sub: 'Being on the same page financially prevents major headaches.',
    options: [
      { value: 'low', icon: '💵', heading: 'Under ₹10k/mo', desc: 'Budget-conscious, looking for affordable options.' },
      { value: 'medium', icon: '💰', heading: '₹10k–₹20k/mo', desc: 'Mid-range, comfort without extravagance.' },
      { value: 'high', icon: '💎', heading: '₹20k+/mo', desc: 'Premium comfort, quality over savings.' }
    ]
  }
];

onAuthStateChanged(auth, user => {
  if (!user) { window.location.href = 'index.html'; return; }
  currentUser = user;
  const initials = (user.displayName || user.email || 'U').substring(0,2).toUpperCase();
  document.getElementById('sidebarAvatar').textContent = initials;
  document.getElementById('sidebarName').textContent = user.displayName || 'User';
  document.getElementById('sidebarEmail').textContent = user.email;
  renderQuestion(1);
});

window.doLogout = async () => { await signOut(auth); window.location.href = 'index.html'; };

function renderQuestion(step) {
  currentStep = step;
  const q = QUESTIONS[step - 1];
  const card = document.getElementById('questionCard');
  card.innerHTML = `
    <div class="q-badge">${q.badge}</div>
    <h2 class="q-title">${q.title}</h2>
    <p class="q-sub">${q.sub}</p>
    <div class="options-grid">
      ${q.options.map(o => `
        <label class="option-label">
          <input type="radio" name="q${step}" value="${o.value}" onchange="selectAnswer('${q.key}','${o.value}')">
          <div class="option-card">
            <div class="check-dot"></div>
            <span class="opt-icon">${o.icon}</span>
            <div class="opt-heading">${o.heading}</div>
            <div class="opt-desc">${o.desc}</div>
          </div>
        </label>
      `).join('')}
    </div>
    <div class="err-banner" id="errBanner">⚠ Please select an option before continuing</div>
    <div class="quiz-footer">
      <button class="btn-ghost" onclick="prevStep()" ${step === 1 ? 'disabled' : ''}>← Previous</button>
      <button class="btn-next" id="nextBtn" onclick="nextStep()">
        <div class="spinner" id="nextSpinner"></div>
        ${step === 4 ? '🔍 Analyze Results' : 'Next Step →'}
      </button>
    </div>
  `;
  // Restore previous answer if exists
  if (answers[q.key]) {
    const radio = card.querySelector(`input[value="${answers[q.key]}"]`);
    if (radio) radio.checked = true;
  }
  updateSidebar(step);
}

window.selectAnswer = (key, value) => {
  answers[key] = value;
  document.getElementById('errBanner').style.display = 'none';
};

window.nextStep = async () => {
  const q = QUESTIONS[currentStep - 1];
  if (!answers[q.key]) {
    document.getElementById('errBanner').style.display = 'block';
    return;
  }
  if (currentStep === 4) {
    await submitQuiz();
    return;
  }
  renderQuestion(currentStep + 1);
};

window.prevStep = () => {
  if (currentStep > 1) renderQuestion(currentStep - 1);
};

async function submitQuiz() {
  const btn = document.getElementById('nextBtn');
  const spinner = document.getElementById('nextSpinner');
  btn.disabled = true; spinner.style.display = 'block';
  try {
    await updateDoc(doc(db, "users", currentUser.uid), {
      quiz: answers,
      quizCompleted: true,
      quizCompletedAt: serverTimestamp()
    });
    // Save to localStorage as backup
    Object.entries(answers).forEach(([k,v]) => localStorage.setItem(k, v));
    window.location.href = 'result.html';
  } catch(e) {
    btn.disabled = false; spinner.style.display = 'none';
    showToast('Failed to save answers. Please try again.', 'error');
  }
}

function updateSidebar(step) {
  const pct = (step / 4) * 100;
  document.getElementById('stepNum').textContent = step;
  document.getElementById('stepPct').textContent = pct + '%';
  document.getElementById('progFill').style.width = pct + '%';
  document.querySelectorAll('.step-item').forEach(el => {
    const s = parseInt(el.dataset.step);
    el.className = 'step-item' + (s === step ? ' active' : s < step ? ' done' : '');
    if (s < step) el.querySelector('.step-circle').textContent = '✓';
  });
}

window.showToast = (msg, type = 'success') => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3500);
};
</script>
</body>
</html>
